<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #89f7fe, #66a6ff);
        margin: 0;
    }
    .container {
        background: white;
        padding: 30px 40px;
        border-radius: 15px;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        width: 360px;
    }
    h2 {
        color: #333;
        margin-bottom: 20px;
    }
    input, button {
        padding: 12px;
        margin: 8px 0;
        width: 100%;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
    }
    button {
        background-color: #66a6ff;
        color: white;
        border: none;
        cursor: pointer;
        transition: background 0.3s;
    }
    button:hover {
        background-color: #89f7fe;
    }
    #password {
        margin-top: 15px;
        font-weight: bold;
        color: #333;
        word-break: break-all;
        font-size: 18px;
    }
    #copyBtn {
        margin-top: 10px;
        background-color: #ff6b6b;
    }
    #copyBtn:hover {
        background-color: #ff8787;
    }
    #showHide {
        margin-top: 10px;
        background-color: #4caf50;
    }
    #showHide:hover {
        background-color: #66bb6a;
    }
    #strength {
        margin-top: 10px;
        font-weight: bold;
    }
</style>
</head>
<body>
<div class="container">
    <h2>Password Generator</h2>
    <input type="number" id="length" placeholder="Enter password length" min="1" max="50">
    <button onclick="generatePassword()">Generate Password</button>
    <div id="password"></div>
    <div id="strength"></div>
    <button id="showHide" onclick="togglePassword()">Show/Hide Password</button>
    <button id="copyBtn" onclick="copyPassword()">Copy to Clipboard</button>
</div>

<script>
let currentPassword = "";
let passwordVisible = true;

function generatePassword() {
    const length = document.getElementById('length').value;
    const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+{}[]";
    if(length < 1) {
        alert("Please enter a valid length!");
        return;
    }
    let password = "";
    for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * charset.length);
        password += charset[randomIndex];
    }
    currentPassword = password;
    displayPassword();
    checkStrength(password);
}

function displayPassword() {
    const passwordDiv = document.getElementById('password');
    passwordDiv.innerText = passwordVisible ? currentPassword : "*".repeat(currentPassword.length);
}

function togglePassword() {
    passwordVisible = !passwordVisible;
    displayPassword();
}

function copyPassword() {
    if(!currentPassword) {
        alert("No password to copy!");
        return;
    }
    navigator.clipboard.writeText(currentPassword)
        .then(() => alert("Password copied to clipboard!"))
        .catch(() => alert("Failed to copy password."));
}

function checkStrength(password) {
    const strengthDiv = document.getElementById('strength');
    let strength = "Weak";
    if(password.length >= 12 && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[!@#$%^&*()_+{}[\]]/.test(password)) {
        strength = "Strong";
        strengthDiv.style.color = "green";
    } else if(password.length >= 8) {
        strength = "Medium";
        strengthDiv.style.color = "orange";
    } else {
        strength = "Weak";
        strengthDiv.style.color = "red";
    }
    strengthDiv.innerText = "Strength: " + strength;
}
</script>
</body>
</html>
